<svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </radialGradient>

    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0f172a" stroke-width="1" opacity="0.07"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .panel-bg { fill: #ffffff; stroke-width: 1.5; fill-opacity: 0.95; }
      .text-label { fill: #1e293b; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; font-size: 14px; }
      .text-detail { fill: #64748b; font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; }
      .text-api { fill: #0ea5e9; font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; }
      .line-main { fill: none; stroke: #cbd5e1; stroke-width: 2; }
      .core-box { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg_grad)"/>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g transform="translate(0, 40)">
    <g transform="translate(360, 0)">
      <rect width="180" height="80" rx="10" class="panel-bg" stroke="#f59e0b" filter="url(#glow)"/>
      <text x="90" y="25" text-anchor="middle" class="text-label">MQTT ADAPTER</text>
      <text x="90" y="45" text-anchor="middle" class="text-detail">AuthN • Rate Limit</text>
      <text x="90" y="60" text-anchor="middle" class="text-detail">Dynamic Mount</text>
      <path id="up_l1" d="M90 120 V80" class="line-main"/>
      <circle r="3" fill="#f59e0b"><animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#up_l1"/></animateMotion></circle>
    </g>
    <g transform="translate(610, 0)">
      <rect width="180" height="80" rx="10" class="panel-bg" stroke="#0ea5e9" filter="url(#glow)"/>
      <text x="90" y="25" text-anchor="middle" class="text-label">OPC UA SERVER</text>
      <text x="90" y="45" text-anchor="middle" class="text-detail">Audit Log • AuthZ</text>
      <text x="90" y="60" text-anchor="middle" class="text-detail">Consistency Check</text>
      <path id="up_l2" d="M90 120 V80" class="line-main"/>
      <circle r="3" fill="#0ea5e9"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#up_l2"/></animateMotion></circle>
    </g>
    <g transform="translate(860, 0)">
      <rect width="180" height="80" rx="10" class="panel-bg" stroke="#8b5cf6" filter="url(#glow)"/>
      <text x="90" y="25" text-anchor="middle" class="text-label">REST/MODBUS-TCP</text>
      <text x="90" y="45" text-anchor="middle" class="text-detail">API Key • TLS</text>
      <text x="90" y="60" text-anchor="middle" class="text-detail">Audit Log</text>
      <path id="up_l3" d="M90 120 V80" class="line-main"/>
      <circle r="3" fill="#8b5cf6"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#up_l3"/></animateMotion></circle>
    </g>
    <path d="M450 120 H950" class="line-main" />
  </g>

  <text x="710" y="195" class="text-api">Shadow Service API: read / write / subscribe</text>

  <g transform="translate(450, 220)">
    <rect width="500" height="180" rx="8" class="panel-bg" stroke="#64748b" filter="url(#glow)" />
    <text x="250" y="30" text-anchor="middle" class="text-label">SHADOW CORE (Internal Model)</text>
    
    <rect x="20" y="50" width="220" height="50" rx="4" class="core-box" />
    <text x="30" y="70" class="text-detail" font-weight="bold">Real Shadow Store (Memory + WAL)</text>
    <rect x="30" y="80" width="100" height="4" rx="2" fill="#e2e8f0" />
    <rect x="30" y="80" width="60" height="4" rx="2" fill="#38bdf8"><animate attributeName="width" values="40;100;40" dur="3s" repeatCount="indefinite"/></rect>

    <rect x="260" y="50" width="220" height="50" rx="4" class="core-box" />
    <text x="270" y="70" class="text-detail" font-weight="bold">Virtual Shadow (Formula Graph)</text>
    <circle cx="450" cy="75" r="5" fill="#8b5cf6" opacity="0.6"><animate attributeName="r" values="3;6;3" dur="1s" repeatCount="indefinite"/></circle>

    <rect x="20" y="115" width="460" height="50" rx="4" class="core-box" />
    <text x="250" y="135" text-anchor="middle" class="text-detail">Edge Compute Engine (Sliding Window / Threshold / Step)</text>
    <text x="250" y="153" text-anchor="middle" class="text-detail" fill="#059669">Atomic Dispatcher: CAS + Sequence Number + QoS ACK</text>
  </g>

  <text x="710" y="440" class="text-api">Shadow Ingress</text>
  <path id="path_ingress" d="M700 400 V470" class="line-main" />
  <circle r="3" fill="#16a34a"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#path_ingress"/></animateMotion></circle>

  <g transform="translate(450, 470)">
    <rect width="500" height="70" rx="8" class="panel-bg" stroke="#16a34a" stroke-dasharray="4,2" />
    <text x="250" y="25" text-anchor="middle" class="text-label">POINTS LAYER</text>
    <text x="250" y="50" text-anchor="middle" class="text-detail">Normalize • Unit Convert • Timestamp Align • Batch Publish (QoS 0/1/2)</text>
  </g>

  <path id="path_to_bus" d="M700 540 V590" class="line-main" />

  <path id="bus_horizontal" d="M150 590 L1250 590" class="line-main" />
  
  <g transform="translate(150, 650)">
    <g transform="translate(0,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#f59e0b" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">MODBUS</text>
      <path id="l1" d="M65 0 V-60" class="line-main"/><circle r="2" fill="#f59e0b"><animateMotion dur="1s" repeatCount="indefinite"><mpath href="#l1"/></animateMotion></circle>
    </g>
    <g transform="translate(200,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#0ea5e9" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">CAN BUS</text>
      <path id="l2" d="M65 0 V-60" class="line-main"/><circle r="2" fill="#0ea5e9"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#l2"/></animateMotion></circle>
    </g>
    <g transform="translate(400,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#ec4899" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">IEC-104</text>
      <path id="l3" d="M65 0 V-60" class="line-main"/><circle r="2" fill="#ec4899"><animateMotion dur="1.3s" repeatCount="indefinite"><mpath href="#l3"/></animateMotion></circle>
    </g>
    <g transform="translate(600,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#16a34a" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">BACNET</text>
      <path id="l4" d="M65 0 V-60" class="line-main"/><circle r="2" fill="#16a34a"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#l4"/></animateMotion></circle>
    </g>
    <g transform="translate(800,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#eab308" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">SNMP</text>
      <path id="l5" d="M65 0 V-60" class="line-main"/><circle r="2" fill="#eab308"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#l5"/></animateMotion></circle>
    </g>
    <g transform="translate(1000,0)">
      <rect width="130" height="60" rx="4" class="panel-bg" stroke="#8b5cf6" filter="url(#glow)" /><text x="65" y="35" text-anchor="middle" class="text-label">PLC S7</text>
      <path id="l6" d="M65 0 V-60" class="line-main"/><circle r="2" fill="#8b5cf6"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#l6"/></animateMotion></circle>
    </g>
  </g>

  <path id="ctrl_flow" d="M1000 310 H1320 V950 H80 V310 H450" fill="none" stroke="#16a34a" stroke-width="1" stroke-dasharray="10,5" opacity="0.15"/>
  <circle r="2" fill="#16a34a"><animateMotion dur="15s" repeatCount="indefinite"><mpath href="#ctrl_flow"/></animateMotion></circle>

</svg>
