<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .bg { fill: #f8fafc; } 
      .layer-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 4,4; }
      .node-rect { fill: #ffffff; stroke: #0ea5e9; stroke-width: 1.5; rx: 8; }
      .node-core { fill: #ffffff; stroke: #8b5cf6; stroke-width: 2; rx: 8; }
      .core-title-bg { fill: #f5f3ff; }
      
      .text-header { fill: #0f172a; font-family: 'Segoe UI', sans-serif; font-size: 26px; font-weight: 800; }
      .text-main { fill: #1e293b; font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 700; }
      .text-sub { fill: #475569; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
      .text-tag { fill: #4f46e5; font-family: 'Consolas', monospace; font-size: 11px; font-weight: bold; }
      
      .flow-line { fill: none; stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); }
      .flow-active { stroke: #3b82f6; stroke-dasharray: 8; animation: dash 3s linear infinite; }
      @keyframes dash { from { stroke-dashoffset: 48; } to { stroke-dashoffset: 0; } }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  
  <text x="700" y="50" text-anchor="middle" class="text-header">工业边缘网关：影子设备核心分层架构</text>

  <g transform="translate(50, 140)">
    <rect width="250" height="680" class="layer-box" rx="12" />
    <text x="125" y="-20" text-anchor="middle" class="text-main" style="fill: #0369a1; font-size: 16px;">01 采集层 (Collection)</text>
    
    <g transform="translate(15, 30)">
      <rect width="220" height="180" class="node-rect" />
      <text x="110" y="25" text-anchor="middle" class="text-main">驱动与协议适配</text>
      <line x1="10" y1="35" x2="210" y2="35" stroke="#f1f5f9" />
      <text x="20" y="65" class="text-sub">• Serial / TCP / UDP 通道</text>
      <text x="20" y="90" class="text-sub">• Modbus / S7 / BACnet</text>
      <text x="20" y="130" class="text-tag">ID: HeartbeatInterval</text>
      <text x="20" y="155" class="text-tag">ID: Qos / BufferSize</text>
    </g>

    <g transform="translate(15, 230)">
      <rect width="220" height="130" class="node-rect" />
      <text x="110" y="25" text-anchor="middle" class="text-main">网络优化策略</text>
      <text x="20" y="65" class="text-sub">RTT 统计状态机</text>
      <text x="20" y="95" class="text-sub">MTU 协商 / Gap 合并</text>
      <circle cx="200" cy="20" r="5" fill="#22c55e" />
    </g>
  </g>

  <g transform="translate(330, 140)">
    <rect width="180" height="680" class="layer-box" rx="12" />
    <text x="90" y="-20" text-anchor="middle" class="text-main" style="font-size: 16px;">02 缓存层 (Buffer)</text>
    
    <g transform="translate(15, 150)">
      <circle cx="75" cy="75" r="55" fill="none" stroke="#bae6fd" stroke-width="10" stroke-dasharray="10 5">
        <animateTransform attributeName="transform" type="rotate" from="0 75 75" to="360 75 75" dur="8s" repeatCount="indefinite" />
      </circle>
      <text x="75" y="80" text-anchor="middle" class="text-main">Ring Buffer</text>
      <text x="75" y="170" text-anchor="middle" class="text-sub">零拷贝环形缓冲</text>
      <text x="75" y="200" text-anchor="middle" class="text-sub">重复包过滤策略</text>
    </g>
  </g>

  <g transform="translate(540, 110)">
    <rect width="320" height="740" class="layer-box" rx="12" style="stroke: #8b5cf6; stroke-dasharray: none; fill: #fdfaff; stroke-width: 2;"/>
    <text x="160" y="-25" text-anchor="middle" class="text-main" style="fill: #6d28d9; font-size: 18px;">★ 影子设备核心 (Shadow Core)</text>
    
    <g transform="translate(20, 40)">
      <rect width="280" height="150" class="node-core" />
      <rect width="280" height="35" class="core-title-bg" rx="8 8 0 0" />
      <text x="140" y="23" text-anchor="middle" class="text-main">Real Shadow Store</text>
      <text x="20" y="70" class="text-sub">In-Memory Key-Value Store</text>
      <text x="20" y="95" class="text-sub">WAL 本地日志持久化</text>
      <rect x="20" y="115" width="240" height="22" rx="11" fill="#6d28d9" />
      <text x="140" y="131" text-anchor="middle" class="text-tag" style="fill: #ffffff;">Source of Truth (唯一源)</text>
    </g>

    <g transform="translate(20, 210)">
      <rect width="280" height="120" class="node-core" />
      <text x="140" y="25" text-anchor="middle" class="text-main">Virtual Shadow Engine</text>
      <text x="20" y="65" class="text-sub">跨设备公式依赖 (DAG)</text>
      <text x="20" y="95" class="text-tag" style="fill:#7c3aed">计算结果原子性同步</text>
    </g>

    <g transform="translate(20, 350)">
      <rect width="280" height="130" class="node-core" />
      <text x="140" y="25" text-anchor="middle" class="text-main">Edge Compute Engine</text>
      <text x="20" y="65" class="text-sub">• 差值 / 步长 / 阈值计算</text>
      <text x="20" y="95" class="text-sub">• 滑动平均 / 窗口函数</text>
    </g>

    <g transform="translate(20, 500)">
      <rect width="280" height="110" class="node-core" />
      <text x="140" y="30" text-anchor="middle" class="text-main">Atomic Dispatcher</text>
      <text x="20" y="65" class="text-sub">版本推进与一致性维护</text>
      <text x="20" y="90" class="text-sub">QoS ACK 确认机制</text>
    </g>
  </g>

  <g transform="translate(890, 140)">
    <rect width="210" height="680" class="layer-box" rx="12" />
    <text x="105" y="-20" text-anchor="middle" class="text-main" style="fill: #b45309; font-size: 16px;">03 边缘计算 (Logic)</text>
    
    <g transform="translate(15, 40)">
      <rect width="180" height="130" class="node-rect" style="stroke:#f59e0b" />
      <text x="90" y="25" text-anchor="middle" class="text-main">TSL 物模型解析</text>
      <text x="20" y="65" class="text-sub">数据清洗与标准映射</text>
      <text x="20" y="95" class="text-sub">动态调整采集步长</text>
    </g>
  </g>

  <g transform="translate(1130, 140)">
    <rect width="220" height="680" class="layer-box" rx="12" />
    <text x="110" y="-20" text-anchor="middle" class="text-main" style="fill: #15803d; font-size: 16px;">05 北向层 (Uplink)</text>
    
    <g transform="translate(15, 30)">
      <rect width="190" height="150" class="node-rect" style="stroke:#22c55e" />
      <text x="95" y="25" text-anchor="middle" class="text-main">标准化上报</text>
      <text x="20" y="65" class="text-sub">JSON / MQTT 协议</text>
      <text x="20" y="95" class="text-sub">数据压缩与加密上报</text>
    </g>

    <g transform="translate(15, 200)">
      <rect width="190" height="130" class="node-rect" style="stroke:#10b981" />
      <text x="95" y="30" text-anchor="middle" class="text-main">COLLECT_CTRL</text>
      <text x="20" y="65" class="text-sub">双向控制 / 参数热更新</text>
      <text x="20" y="105" class="text-tag" style="fill:#059669">MODE: BIDIRECTIONAL</text>
    </g>
  </g>

  <path d="M 300 320 H 345" class="flow-line flow-active" />
  <path d="M 510 320 H 540" class="flow-line flow-active" />
  <path d="M 860 320 H 890" class="flow-line flow-active" />
  <path d="M 1100 320 H 1130" class="flow-line flow-active" />

  <rect x="450" y="855" width="500" height="35" rx="17" fill="#1e293b" />
  <text x="700" y="878" text-anchor="middle" class="text-sub" style="fill: #ffffff; font-weight: bold;">影子设备层：跨组件共享的唯一高一致性数据模型中心</text>

</svg>
