<svg width="1400" height="780" viewBox="0 0 1400 780" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0f172a"/>

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4ade80" />
    </marker>

    <style>
      .panel-bg { fill: #1e293b; stroke-width: 2; }
      .text-label { fill: #f1f5f9; font-family: 'Segoe UI', Arial; font-weight: 600; font-size: 16px; }
      .text-sub { fill: #94a3b8; font-family: monospace; font-size: 12px; }
      .line-main { fill: none; stroke: #334155; stroke-width: 2; }
      .line-active { fill: none; stroke: #38bdf8; stroke-width: 2; stroke-dasharray: 4,4; }
    </style>
  </defs>

  <path id="path_cloud_gw" d="M700 160 L700 80" class="line-active" stroke="#38bdf8" marker-start="url(#arrow)"/>
  
  <path id="path_main_bus" d="M700 230 L700 560" class="line-main" />

  <path id="bus_horizontal" d="M150 560 L1150 560" class="line-main" />

  <g transform="translate(600, 20)">
    <rect width="200" height="60" rx="30" class="panel-bg" stroke="#38bdf8" filter="url(#glow)"/>
    <text x="100" y="38" text-anchor="middle" class="text-label">CLOUD CORE</text>
  </g>

  <g transform="translate(550, 160)">
    <rect width="300" height="70" rx="8" class="panel-bg" stroke="#4ade80" />
    <text x="150" y="42" text-anchor="middle" class="text-label">IOT GATEWAY</text>
    <circle cx="280" cy="20" r="4" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <g transform="translate(550, 275)">
    <rect width="300" height="90" rx="8" class="panel-bg" stroke="#94a3b8" />
    <text x="150" y="40" text-anchor="middle" class="text-label">SHADOW CORE</text>
    <text x="150" y="65" text-anchor="middle" class="text-sub">STATE SYNC ACTIVE</text>
  </g>

  <g transform="translate(550, 410)">
    <rect width="300" height="110" rx="8" class="panel-bg" stroke="#8b5cf6" />
    <text x="150" y="45" text-anchor="middle" class="text-label">RTT MTU GAP</text>
    <path d="M40 70 H260" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2,2"/>
  </g>

  <g transform="translate(150, 620)">
    <g transform="translate(0,0)">
      <rect width="120" height="60" rx="4" class="panel-bg" stroke="#f59e0b" />
      <text x="60" y="35" text-anchor="middle" class="text-label" style="font-size:14px">MQTT</text>
      <path id="p1" d="M60 0 V-60" class="line-main"/>
    </g>
    <g transform="translate(200,0)">
      <rect width="120" height="60" rx="4" class="panel-bg" stroke="#0ea5e9" />
      <text x="60" y="35" text-anchor="middle" class="text-label" style="font-size:14px">OPC-UA</text>
      <path id="p2" d="M60 0 V-60" class="line-main"/>
    </g>
    <g transform="translate(400,0)">
      <rect width="120" height="60" rx="4" class="panel-bg" stroke="#8b5cf6" />
      <text x="60" y="35" text-anchor="middle" class="text-label" style="font-size:14px">HTTP API</text>
      <path id="p3" d="M60 0 V-60" class="line-main"/>
    </g>
    <g transform="translate(600,0)">
      <rect width="120" height="60" rx="4" class="panel-bg" stroke="#ec4899" />
      <text x="60" y="35" text-anchor="middle" class="text-label" style="font-size:14px">MODBUS</text>
      <path id="p4" d="M60 0 V-60" class="line-main"/>
    </g>
    <g transform="translate(800,0)">
      <rect width="120" height="60" rx="4" class="panel-bg" stroke="#22c55e" />
      <text x="60" y="35" text-anchor="middle" class="text-label" style="font-size:14px">BACNET</text>
      <path id="p5" d="M60 0 V-60" class="line-main"/>
    </g>
  </g>

  <circle r="3" fill="#38bdf8" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite">
      <mpath href="#path_cloud_gw"/>
    </animateMotion>
  </circle>

  <circle r="3" fill="#f1f5f9">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#path_main_bus"/>
    </animateMotion>
  </circle>

  <path id="ctrl_flow" d="M850 195 H1300 V750 H50 V195 H550" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="10,5" opacity="0.4"/>
  <circle r="2" fill="#4ade80">
    <animateMotion dur="10s" repeatCount="indefinite">
      <mpath href="#ctrl_flow"/>
    </animateMotion>
  </circle>

  <circle r="2.5" fill="#f59e0b"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion></circle>
  <circle r="2.5" fill="#0ea5e9" begin="0.5s"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
  <circle r="2.5" fill="#8b5cf6" begin="1s"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle>

</svg>
